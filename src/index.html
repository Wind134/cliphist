<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipHist</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="/main.js" defer></script>
</head>
<body>
  <div class="window">
    <header class="titlebar">
      <div class="titlebar-drag">
        <span class="titlebar-title">ClipHist</span>
        <span class="titlebar-subtitle">剪贴板历史</span>
      </div>
      <div class="titlebar-actions">
        <span id="item-count" class="item-count">0 条记录</span>
        <button id="btn-clear" class="btn-icon" title="清空历史">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
        <button id="btn-minimize" class="btn-icon" title="最小化">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="btn-close" class="btn-icon btn-close" title="关闭">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-container">
      <div class="category-tabs" id="category-tabs">
        <button class="cat-tab active" data-cat="all">全部</button>
        <button class="cat-tab" data-cat="image">图片</button>
        <button class="cat-tab" data-cat="text">文本</button>
        <button class="cat-tab" data-cat="link">链接</button>
        <button class="cat-tab" data-cat="short">短文本</button>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="搜索剪贴板历史..." autocomplete="off" />
        <button id="btn-search-clear" class="search-clear" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <main class="content">
      <div id="history-list" class="history-list">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
            <rect x="9" y="3" width="6" height="4" rx="2"></rect>
          </svg>
          <p>暂无剪贴板记录</p>
          <p class="empty-hint">复制内容后会显示在这里</p>
        </div>
      </div>
    </main>

    <footer class="statusbar">
      <span id="status-text">监听中...</span>
      <span id="shortcut-hint">双击或 Enter 复制</span>
    </footer>
  </div>

  <div id="toast" class="toast" style="display:none"></div>
</body>
</html>
