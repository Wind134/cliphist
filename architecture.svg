<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 850">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 9px; fill: #374151; }
      .label { font-family: Arial, sans-serif; font-size: 8px; fill: #6b7280; }
      .layer-title { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #ffffff; }
      .legend-title { font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #1a1a1a; }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="900" height="850" fill="#ffffff"/>

  <!-- ========== LAYER 1: Frontend ========== -->
  <rect x="20" y="15" width="860" height="130" fill="#2563eb" rx="8"/>
  <text x="35" y="33" class="layer-title">FRONTEND LAYER — src/</text>

  <rect x="35" y="45" width="120" height="85" fill="white" stroke="#d1d5db" stroke-width="1" rx="4"/>
  <text x="42" y="60" class="title">index.html</text>
  <text x="42" y="74" class="subtitle">titlebar</text>
  <text x="42" y="85" class="subtitle">search-container</text>
  <text x="42" y="96" class="subtitle">history-list</text>
  <text x="42" y="107" class="subtitle">statusbar</text>
  <text x="42" y="118" class="subtitle">settings-panel</text>

  <rect x="165" y="45" width="100" height="85" fill="white" stroke="#d1d5db" stroke-width="1" rx="4"/>
